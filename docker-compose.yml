services:
  postgres:
    image: postgres:16
    container_name: smart-warehouse-db
    environment:
      POSTGRES_DB: smart_warehouse
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d smart_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smart-warehouse-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@warehouse.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  app:
    build: .
    container_name: smart-warehouse-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/smart_warehouse
      DB_USER: warehouse_user
      DB_PASSWORD: warehouse_pass
    stdin_open: true
    tty: true
    command: ["java", "-jar", "app.jar"]

volumes:
  postgres_data:
  pgadmin_data:
