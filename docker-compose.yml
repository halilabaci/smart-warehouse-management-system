version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: warehouse_db
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: warehouse_app
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
